name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  # ─── Build on each platform ────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsecret-1-dev \
            libsecret-1-0 \
            libgtk-3-dev \
            rpm \
            fakeroot \
            dpkg

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build (compile TypeScript + Vite)
        run: npm run build
        env:
          ELECTRON_RUN_AS_NODE: ''

      # Unit tests run before electron-rebuild so keytar.node is still
      # compiled for Node.js ABI — electron-rebuild changes it to Electron ABI
      - name: Run unit tests
        run: npm run test:unit

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w keytar

      # ── Detect whether signing secrets are available ───────────────────────
      - name: Check signing secrets
        id: signing
        shell: bash
        run: |
          echo "mac=${{ secrets.MAC_CSC_LINK != '' }}" >> $GITHUB_OUTPUT
          echo "win=${{ secrets.WIN_CSC_LINK != '' }}" >> $GITHUB_OUTPUT

      # ── macOS: build (signed+notarized when cert available, unsigned otherwise)
      - name: Package (macOS)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ${{ steps.signing.outputs.mac == 'true' && secrets.MAC_CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ steps.signing.outputs.mac == 'true' && secrets.MAC_CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ steps.signing.outputs.mac == 'true' && secrets.APPLE_ID || '' }}
          APPLE_TEAM_ID: ${{ steps.signing.outputs.mac == 'true' && secrets.APPLE_TEAM_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ steps.signing.outputs.mac == 'true' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}

      # ── Windows: build (signed when cert available, unsigned otherwise) ────
      - name: Package (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ${{ steps.signing.outputs.win == 'true' && secrets.WIN_CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ steps.signing.outputs.win == 'true' && secrets.WIN_CSC_KEY_PASSWORD || '' }}

      # ── Linux: no signing required ─────────────────────────────────────────
      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (for inspection)
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: release-${{ matrix.platform }}
          path: release/
          retention-days: 7
