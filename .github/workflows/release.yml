name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  # ─── Build on each platform ────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsecret-1-dev \
            libsecret-1-0 \
            libgtk-3-dev \
            rpm \
            fakeroot \
            dpkg

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install electron-rebuild
        run: npm install --save-dev @electron/rebuild

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w keytar

      - name: Build (compile TypeScript + Vite)
        run: npm run build
        env:
          ELECTRON_RUN_AS_NODE: ''

      - name: Run unit tests
        run: npm run test:unit

      # ── macOS: code sign + notarize ────────────────────────────────────────
      - name: Package (macOS — signed + notarized)
        if: matrix.platform == 'mac'
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      # ── Windows: code sign (skipped if cert secrets not set) ───────────────
      - name: Package (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      # ── Linux: no signing required ─────────────────────────────────────────
      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (for inspection)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-${{ matrix.platform }}
          path: release/
          retention-days: 7
