name: CI

on:
  push:
    branches: [develop, 'feat/**', 'fix/**']
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Lint, Type-check & Test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev libsecret-1-0 xvfb

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules
        run: npx electron-rebuild -f -w keytar

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit -- --coverage

      - name: Build
        run: npm run build
        env:
          ELECTRON_RUN_AS_NODE: ''

      - name: Integration tests (headless)
        run: xvfb-run --auto-servernum npm run test:integration
        env:
          ELECTRON_RUN_AS_NODE: ''
